name: Vulnerability scan

# Deliberately unfiltered by path. A workflow-level `paths:` filter leaves a
# required check permanently pending (see the detect-changes job in ci.yml), so
# a job that always runs is the shape that can be promoted to a required check
# later without restructuring its triggers. The scheduled run is the one that
# matters most: an advisory published against an unchanged dependency is
# invisible to every push-driven trigger.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly. GitHub disables scheduled workflows after 60 days without
    # repository activity, so a long-quiet repository stops scanning silently —
    # read a gap in these runs as a symptom, not as an absence of findings.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

# Grouped like ci.yml, but without cancel-in-progress: on main the scheduled run
# and a push run share a ref, and cancelling the weekly scan because someone
# pushed would drop the one run that exists to fire when nothing else does.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # govulncheck is a tool dependency in go.mod, so `go tool` runs the pinned,
      # checksum-verified version. It resolves the standard library it reports on
      # from the go command on PATH — which setup-go takes from go.mod — so the
      # scan's stdlib baseline is the same version the binary is built with.
      - name: Scan dependencies and standard library
        run: go tool govulncheck ./...

  # Toolchain currency is a separate job, and separate on purpose: mise
  # provisions the whole toolchain including a prebuilt binary from a
  # third-party repository, and there is no reason to execute that on every pull
  # request just to produce a report. Scheduled and manual runs only.
  toolchain-report:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4
        with:
          version: 2026.7.7
          # Report on the pinned versions; do not install them.
          install: false

      # Advisory only. The mise-managed toolchain is under no update bot (no
      # ecosystem covers mise.toml), so this run is the mechanism behind the
      # manual review posture recorded in SECURITY.md — a dated, visible
      # currency report rather than a cadence nobody is reminded of.
      - name: Report outdated toolchain pins
        continue-on-error: true
        run: mise outdated
