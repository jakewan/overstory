name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # dorny/paths-filter reads the PR's changed-file list via the API on
  # pull_request events.
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Gate the Go jobs on whether the change can affect a Go build/lint outcome.
  # A job skipped via job-level `if:` is reported as "skipped" = passing for
  # required status checks, so a doc-only PR stays mergeable once test/lint are
  # required — without the workflow-level `paths:` filter that would leave
  # required checks permanently pending.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/ci.yml'
            docs:
              - 'docs/**'
              - 'mise.toml'
              - 'mise.lock'
              - '.github/workflows/ci.yml'

  test:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # go-version-file keeps the Go version single-sourced in go.mod; setup-go
      # enables module caching by default.
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # Re-hashes the restored module cache so a corrupted or tampered cache entry
      # can't be built against — setup-go restores a cache keyed on go.sum, and
      # `go build` won't re-hash an already-extracted module directory. go.sum
      # itself is enforced unconditionally by the go command; this is not that.
      - run: go mod verify

      # Duplicates `just tidy-check` deliberately — this job installs neither
      # mise nor just, so the raw command is the only form available here. Keep
      # the two in step, as with the golangci-lint version pin below.
      - name: Check go.mod tidiness
        run: go mod tidy -diff

      - run: go build ./...

      - run: go test -race ./...

  lint:
    needs: detect-changes
    if: needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      # golangci-lint-action needs the version explicitly; this is the one
      # intentional duplication of the pin in mise.toml. Keep the two in lockstep.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  docs:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # mise installs the pinned mdbook + mdbook-linkcheck2 backend from
      # mise.toml, so CI builds the docs with the same toolchain as local
      # development. `just docs-build` runs mdbook, which invokes the linkcheck2
      # renderer; a broken link or structure fails the build.
      #
      # mise itself is version-pinned rather than floating: it is the component
      # that verifies every other tool's checksum against mise.lock, so letting
      # it drift would let the verifier change under the repository between
      # runs. Because mise.lock is present, the action runs `mise install
      # --locked`, which refuses any tool lacking a recorded URL for the
      # platform.
      - uses: jdx/mise-action@v4
        with:
          version: 2026.7.7

      - run: just docs-build
