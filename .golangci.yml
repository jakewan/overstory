version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - errorlint
    - misspell
    - revive

  settings:
    errcheck:
      check-blank: true

    govet:
      enable:
        - shadow

    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false

formatters:
  enable:
    - gofmt
    - goimports
