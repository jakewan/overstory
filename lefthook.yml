pre-commit:
  parallel: true
  commands:
    go-format:
      glob: "**/*.go"
      # golangci-lint fmt applies the formatters configured in .golangci.yml
      # (gofmt + goimports) — the same set CI enforces — so a commit can't pass
      # the hook with import ordering that would later fail the lint job.
      run: golangci-lint fmt {staged_files}
      stage_fixed: true
      skip: merge

pre-push:
  piped: true
  commands:
    go-lint:
      priority: 1
      run: just lint
      skip: merge
    go-test:
      priority: 2
      run: just test
      skip: merge
    docs-build:
      priority: 3
      # Only runs when the push includes docs changes; builds the book and runs
      # the linkcheck2 backend, so a broken link or structure is caught before
      # push rather than only in CI.
      glob: "docs/**"
      run: just docs-build
      skip: merge
